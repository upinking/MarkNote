<svg width="980" height="560" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f160b" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #fbf4e7; }
      .card { fill: #fffaf0; stroke: #dfc8a2; stroke-width: 1.5; }
      .button { fill: #f4deb5; stroke: #bb8549; stroke-width: 2.5; }
      .ink { fill: none; stroke: #342515; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .ink-thin { fill: none; stroke: #342515; stroke-width: 4.2; stroke-linecap: round; stroke-linejoin: round; }
      .accent { fill: #b9823e; }
      .accent-stroke { fill: none; stroke: #b9823e; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .muted { fill: #8c7559; font: 600 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { fill: #342515; font: 800 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #8c7559; font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #4a3823; font: 750 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="980" height="560"/>
  <text x="48" y="54" class="title">Default mode icon options</text>
